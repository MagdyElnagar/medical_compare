<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
	<meta charset="UTF-8">
	<title>مصفرات</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
	<link rel="stylesheet" href="src/main/css/style.css">

</head>


<body>
	<div th:replace="~{fragments/header :: header}"></div>





	<form th:action="@{/zerostockadd}" method="post">
		<div class="card">
			<div class="card-shadow mb-5 p-3">
				<div class="row">
					<div class="col">
						<div class=" col col-s input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الاسم </span>
							</div>
							<input type="text" name="name" class="form-control" aria-label="Default"
								aria-describedby="inputGroup-sizing-default" autocomplete="off" required>
						</div>
					</div>
					<div class="col">
						<div class=" col col-s input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">السعر </span>
							</div>
							<input type="text" name="price" class="form-control" aria-label="Default"
								aria-describedby="inputGroup-sizing-default" autocomplete="off" required>
						</div>
					</div>
					<div class="col">
						<div class=" col col-s input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الخصم </span>
							</div>
							<input type="text" name="discount" class="form-control" aria-label="Default"
								aria-describedby="inputGroup-sizing-default" autocomplete="off" required>
						</div>
					</div>
				</div>
				<div class="row">
					<div class="col">
						<div class=" col col-s input-group mb-3">

							<button type="submit" class="btn  btn-outline-success w-100 p-3">
								حفظ</button>
						</div>
					</div>
				</div>

			</div>

		</div>
	</form>
	<table id="compTable" class="table  table-hover text-center">
		<thead class="table-dark text-center">
			<tr>
				<th>الاسم</th>
				<th>السعر</th>
				<th>الخصم</th>
				<th>@</th>
			</tr>
		</thead>
		<tbody>

			<tr th:each="p : ${products}">
				<td th:text="${p.name}"></td>
				<td th:text="${p.price}"></td>
				<td th:text="${p.discount}"></td>
				<td>
					<form th:action="@{/delete_sginal_ZeroSotck_rebak}" method="post">

						<input type="hidden" name="name" th:value="${p.name}" />
						<input type="hidden" name="price" th:value="${p.price}" />
						<input type="hidden" name="discount" th:value="${p.discount}" />
						<input type="hidden" name="id" th:value="${p.id}" />


						<button class="btn btn-outline-danger" onclick="return confirm('متأكد عايز تمسح؟')"
							type="submit">
							مسح الصنف
						</button>

					</form>
				</td>
			</tr>
		</tbody>
	</table>

</body>

</html>
