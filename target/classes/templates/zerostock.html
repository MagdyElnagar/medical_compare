<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
	<meta charset="UTF-8">
	<title>مصفرات</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
</head>

<body class="bg-light">
	<div th:replace="~{fragments/header :: header}"></div>

	<div class="container-fluid mt-3">
		<div class="row g-3 mb-3">

			<!-- إضافة يدوي - اسم بس -->
			<div class="col-md-6">
				<div class="card h-100">
					<div class="card-header fw-bold">➕ إضافة صنف يدوي</div>
					<div class="card-body">
						<form th:action="@{/zerostockadd}" method="post">
							<div class="input-group">
								<span class="input-group-text">اسم الصنف</span>
								<input type="text" name="name" class="form-control" autocomplete="off" required
									placeholder="مثال: بروفين 400">
								<button type="submit" class="btn btn-outline-success">حفظ</button>
							</div>
						</form>


					</div>
				</div>
			</div>

			<!-- رفع Excel -->
			<div class="col-md-6">
				<div class="card h-100">
					<div class="card-header fw-bold">📂 رفع ملف Excel (عمود اسم الصنف بس)</div>
					<div class="card-body">


						<form th:action="@{/zerostock_upload_excel}" method="post" enctype="multipart/form-data">
							<div class="input-group">
								<input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
								<button type="submit" class="btn btn-outline-primary">رفع</button>
							</div>
							<small class="text-muted mt-1 d-block">الملف يحتوي على عمود واحد فيه أسماء الأصناف (بدون
								header أو بـ header في السطر الأول)</small>
						</form>
					</div>
				</div>
			</div>
		</div>
		<div class="col-md-6">
			<div class="card h-100">
				<div class="card-header fw-bold">📂 رفع ملف Excel (عمود اسم الصنف + السعر) </div>
				<div class="card-body">

					<form th:action="@{/upload_reference_prices}" method="post" enctype="multipart/form-data">
						<div class="input-group">
							<input type="file" name="fileRef" class="form-control" accept=".xlsx,.xls" required>
							<button type="submit" class="btn btn-outline-primary">رفع</button>


						</div>
						<small class="text-muted mt-1 d-block">رفع الملف المرجعى اول عمود الاسم تانى عمود
							السعر</small>


					</form>

					<form th:action="@{/delete_reference_prices}" method="get" enctype="multipart/form-data">


						<button type="submit" class="btn btn-outline-danger"
							onclick="return confirm('متأكد؟')">مسح</button>
					</form>
				</div>
			</div>
		</div>
	</div>

	<!-- الجدول -->
	<div class="card shadow">
		<div class="card-header d-flex justify-content-between align-items-center">
			<span class="fw-bold">📋 قائمة المصفرات</span>
			<form th:action="@{/deleteAllZeroStock}" method="post"
				onsubmit="return confirm('متأكد عايز تمسح كل المصفرات؟')">
				<button class="btn btn-outline-danger btn-sm">🗑 مسح الكل</button>
			</form>
		</div>
		<div class="card-body table-responsive">
			<table id="compTable" class="table table-hover text-center">
				<thead class="table-dark text-center">
					<tr>
						<th>#</th>
						<th>اسم الصنف</th>
						<th>السعر </th>
						<th th:each="wName : ${warehouses}" th:text="${wName}"></th>
						<th>@</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item, stat : ${enrichedList}">
						<td th:text="${stat.count}" class="text-muted"></td>
						<td class="fw-bold text-end" th:text="${item.product.name}"></td>
						<td class="fw-bold text-end" th:text="${item.product.price}"></td>

						<td th:each="wName : ${warehouses}" class="discount">
							<span th:if="${item.warehouseMatches.containsKey(wName)}"
								th:text="${item.warehouseMatches.get(wName)}">
							</span>
						</td>

						<td>
							<form th:action="@{/delete_sginal_ZeroSotck_rebak}" method="post">
								<input type="hidden" name="name" th:value="${item.product.name}" />
								<input type="hidden" name="price" value="0" />
								<input type="hidden" name="id" th:value="${item.product.id}" />
								<button class="btn btn-outline-danger btn-sm" onclick="return confirm('متأكد؟')"
									type="submit">مسح</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
	</div>

	<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
	<script>
		$(document).ready(function () {
			// تلوين الخصومات — أخضر = أعلى، أصفر = أقل
			$('#compTable tbody tr').each(function () {
				let cells = $(this).find('.discount');
				let values = cells.map(function () {
					let v = parseFloat($(this).text());
					return isNaN(v) ? -Infinity : v;
				}).get();

				let max = Math.max(...values);
				if (!isFinite(max)) return;

				cells.each(function () {
					let v = parseFloat($(this).text());
					if (!isNaN(v) && v === max) {
						$(this).addClass('bg-success text-white p-2');
					} else if (!isNaN(v) && v < max) {
						$(this).addClass('bg-warning p-2');
					}
				});
			});

			$('#compTable').DataTable({
				language: {url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/ar.json'},
				pageLength: 20,
				paging: true,
				searching: true,
				ordering: true,
				dom: 'Bfrtip',
				responsive: true
			});
		});
	</script>
</body>

</html>
