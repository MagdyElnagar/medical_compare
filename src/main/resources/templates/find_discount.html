<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
	<meta charset="UTF-8">
	<title>المرجح</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">



</head>


<style>

</style>

<body class="bg-light">

	<div th:replace="~{fragments/header :: header}"></div>


	<div class="container-fluid mt-4">
		<div class="card shadow">

			<div class="card-body">
				<form th:action="@{/find_discount_method}" method="post">
					<div class="row">

						<div class=" col col-m input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الرصيد </span>
							</div>
							<input type="text" name="old_qty" th:value="${old_qty}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>

						<div class="col col-m  input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الخصم</span>
							</div>
							<input type="text" name="old_discount" th:value="${old_discount}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>

						<div class="col col-m  input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">السعر</span>
							</div>
							<input type="text" name="old_price" th:value="${old_price}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>





					</div>
					<div class="row">


						<div class=" col col-m input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الرصيد </span>
							</div>
							<input type="text" name="new_qty" th:value="${new_qty}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>
						<div class="col col-m  input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">الخصم</span>
							</div>
							<input type="text" name="new_discount" th:value="${new_discount}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>




						<div class="col col-m  input-group mb-3">
							<div class="input-group-prepend">
								<span class="input-group-text" id="inputGroup-sizing-default">السعر</span>
							</div>
							<input type="text" name="new_price" th:value="${new_price}" class="form-control"
								aria-label="Default" aria-describedby="inputGroup-sizing-default" autocomplete="off"
								required>
						</div>






					</div>
					<div class="row mb-3">
						<div class="col col-sm">
							<button type="submit" class="btn btn-success">Submit</button>
						</div>
					</div>
					<div class="">


						<table class="table  table-hover table-strip text-center">

							<thead class="table-dark text-center">
								<tr>
									<th>الكمية</th>
									<th>الخصم</th>
									<th>السعر</th>

								</tr>
							</thead>
							<tbody>
								<tr>
									<td th:text="${all_QTY}"></td>
									<td th:text="${#numbers.formatDecimal(last_discount, 1, 3)}"></td>
									<td th:text="${#numbers.formatDecimal(cost_per_1, 1, 3)}"></td>
								</tr>
							</tbody>
						</table>
					</div>
			</div>

		</div>

	</div>



	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

	<script>
		$(document).ready(function () {
			$('#compTable').DataTable({
				language: {url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/ar.json'},
				pageLength: 20,
				paging: true,
				searching: true,
				ordering: true,
				dom: 'Bfrtip', // لتفعيل أزرار الطباعة والاكسيل
				responsive: true
			});



		});
	</script>
</body>

</html>
